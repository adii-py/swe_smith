model: portkey/gpt-5-mini
litellm_model_name_override: openai/gpt-5-mini
provider: "@openai"
system: |-
  You are a software engineer helping to create a realistic dataset of synthetic GitHub issues.

  You will be given the following input:

  1. Demonstration: A realistic GitHub issue to mimic (included in the <demonstration> tag).
  2. Patch: A git diff output/pull request changes that introduces a bug (included in the <patch> tag).
  3. Test output: The output of running the tests after the patch is applied (included in the <test_output> tag).
  4. Test source code: Source code for one or more tests that failed (included in the <test_source_code> tag).

  Output: A realistic GitHub issue for the patch that describes ONLY observable symptoms and behaviors.

  CRITICAL GUIDELINES:

  - Describe ONLY observable symptoms and expected behavior. NEVER mention:
    * File names or file paths
    * Function names, method names, or class names
    * Variable names or internal data structures
    * Implementation details or code-level specifics
    * The specific lines of code that need changing

  - REQUIRE multi-step reasoning to solve:
    * Describe symptoms that could have multiple possible causes
    * Provide indirect clues about the nature of the problem
    * Force the reader to explore the codebase and understand system behavior
    * Make the root cause non-obvious from the description alone

  - Include a deterministic reproduction scenario:
    * Provide exact inputs or configuration that triggers the issue
    * Describe the sequence of actions that leads to the problem
    * Include expected vs actual behavior comparison

  - Use subtle indirect clues ONLY:
    * Hint at the category of functionality affected (e.g., "distributed processing", "memory management")
    * Reference behavioral patterns without naming specific components
    * Describe the symptom's characteristics (e.g., "intermittent", "deterministic", "platform-specific")

  - ABSOLUTELY FORBIDDEN (will cause the issue to be rejected):
    * DO NOT GIVE AWAY THE FIX
    * DO NOT mention specific source files, modules, or code locations
    * DO NOT suggest which functions or methods are involved
    * DO NOT describe the internal algorithm or logic that needs correction
    * DO NOT say "the bug is in X file" or "Y function needs Z change"

  - DO explain the observable effects and user-visible behaviors
  - DO describe the impact on system functionality from a user's perspective
  - DO include enough context for someone to reproduce and investigate
  - DO mimic the natural style of demonstration issues
demonstration: |-
  Here are a few realistic GitHub issues that you can mimic.

  {% for problem_statement in demo_problem_statements[:2] %}
  <demonstration>
  {{problem_statement}}
  </demonstration>
  {% endfor %}
instance: |-
  Now, write a GitHub issue for the following patch (diff output).

  <CRITICAL REQUIREMENTS>
  - Describe ONLY observable symptoms and behaviors - NEVER mention file paths, function names, or implementation details
  - The issue should require multi-step reasoning to understand the root cause
  - Include subtle indirect clues about the problem domain without giving away the fix
  - Provide a deterministic reproduction scenario with exact steps
  - Focus on WHAT is wrong and HOW it manifests, not WHERE in the code
  - DO NOT GIVE AWAY THE FIX! THE SOLUTION CODE SHOULD NEVER APPEAR IN YOUR RESPONSE.
  - DO NOT SAY THAT EXISTING TEST(s) FAILED.
  - DO NOT SUGGEST RUNNING ANY TESTING COMMANDS (e.g., pytest).
  - Mimic the natural, human style of the demonstration issues.
  </CRITICAL REQUIREMENTS>

  <patch>
  {{patch}}
  </patch>

  <test_output>
  {{test_output}}
  </test_output>

  <test_source_code>
  {% for test in test_funcs[:5] %}
  {{test}}
  {% endfor %}
  </test_source_code>

  **Issue Text**
  <START WRITING>