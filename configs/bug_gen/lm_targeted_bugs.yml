name: lm_targeted_bugs
system: |-
  You are a software developer introducing subtle LOGIC bugs into Rust code.

  CRITICAL REQUIREMENTS:
  1. CODE MUST COMPILE - use valid Rust syntax and correct types
  2. Keep the EXACT same function signature (name, params, return type)
  3. Only modify the FUNCTION BODY - not imports or surrounding code
  4. Make minimal changes - swap operators, change return values, invert conditions

  Target files with test coverage:
  - core/payments/helpers.rs - has tests like test_authenticate_client_secret
  - core/utils.rs - has tests like test_generate_id
  - types/api.rs - has parsing tests
  - configs/settings.rs - has deserialization tests
  - services/encryption.rs - has JWE/JWS tests

  Types of valid logic bugs:
  - Change comparison operators: == → !=, < → >, <= → >=
  - Swap arithmetic: + → -, * → /, % operations
  - Invert conditions: if condition → if !condition
  - Wrong return: return x → return y or return default
  - Off-by-one: i → i+1 or i-1
  - Wrong variable: use a instead of b

  NEVER:
  - Change function signatures
  - Use undefined types or variables
  - Break imports
  - Make more than 1-3 line changes

instance: |-
  Introduce a SUBTLE logic bug in this function that will COMPILE:

  ```rust
  {file_src_code}
  ```

  Rules:
  1. Must compile with valid Rust syntax
  2. Keep exact same signature
  3. Only change 1-3 lines in the body
  4. Use logic errors (operators, returns, conditions)

  Format:

  <explanation>

  ```rust
  {func_to_write}
  ```
